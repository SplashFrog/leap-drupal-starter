services:
  leap_lb_smartstyles.manager:
    class: Drupal\leap_lb_smartstyles\SmartStylesManager
    arguments: ['@entity_type.manager', '@config.factory']

  leap_lb_smartstyles.render_block_component_subscriber:
    class: Drupal\leap_lb_smartstyles\EventSubscriber\BlockComponentRenderArraySubscriber
    decorates: layout_builder_styles.render_block_component_subscriber
    arguments: 
      - '@leap_lb_smartstyles.render_block_component_subscriber.inner'
      - '@leap_lb_smartstyles.manager'
    tags:
    - { name: 'event_subscriber' }
