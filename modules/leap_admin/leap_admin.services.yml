services:
  leap_admin.route_subscriber:
    class: Drupal\leap_admin\Routing\AdminRouteSubscriber
    tags:
      - { name: event_subscriber }

  leap_admin.bulk_moderation:
    class: Drupal\leap_admin\BulkModerationService
    arguments:
      - '@entity_type.manager'
      - '@language_manager'
      - '@current_user'
      - '@datetime.time'
      - '@logger.factory'
